<div id="background-management" class="tab-content">
    <div class="section-title">
        <i class="fas fa-image"></i> Quản lý Background
    </div>
    
    <div class="form-container">
        <div class="form-group">
            <label>Upload Background mới</label>
            <input type="file" id="backgroundFile" accept="image/*" class="mb-2">
            <button class="btn btn-primary" onclick="uploadBackground()">
                <i class="fas fa-upload"></i> Upload
            </button>
        </div>
        
        <div class="form-group">
            <label>Chọn Background hiện có</label>
            <div id="backgroundList" class="d-flex flex-wrap gap-3">
                <!-- Danh sách background sẽ được load ở đây -->
            </div>
        </div>
    </div>
    
    <div class="section-title">
        <i class="fas fa-desktop"></i> Xem trước
    </div>
    
    <div class="preview-container" style="border: 1px solid #ddd; border-radius: 6px; padding: 10px; background-color: white;">
        <div id="backgroundPreview" style="width: 100%; height: 300px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;">
            <p style="background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 4px;">
                Xem trước background sẽ hiển thị ở đây
            </p>
        </div>
    </div>
</div>
<script>
// Thêm vào phần script
function uploadBackground() {
    const fileInput = document.getElementById('backgroundFile');
    const file = fileInput.files[0];
    
    if (!file) {
        Swal.fire({
            icon: 'warning',
            title: 'Chưa chọn file',
            text: 'Vui lòng chọn file ảnh để upload'
        });
        return;
    }
    
    const formData = new FormData();
    formData.append('background', file);
    
    Swal.fire({
        title: 'Đang upload...',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
    
    fetch('/api/upload_background', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            Swal.fire({
                icon: 'success',
                title: 'Thành công',
                text: 'Đã upload background thành công!'
            });
            loadBackgrounds();
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Lỗi',
                text: data.message || 'Upload thất bại'
            });
        }
    })
    .catch(error => {
        Swal.fire({
            icon: 'error',
            title: 'Lỗi',
            text: 'Có lỗi xảy ra khi upload'
        });
    });
}

function loadBackgrounds() {
    fetch('/api/get_backgrounds')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('backgroundList');
        container.innerHTML = '';
        
        data.backgrounds.forEach(bg => {
            const bgItem = document.createElement('div');
            bgItem.style.width = '150px';
            bgItem.style.height = '100px';
            bgItem.style.backgroundImage = `url('${bg.url}')`;
            bgItem.style.backgroundSize = 'cover';
            bgItem.style.backgroundPosition = 'center';
            bgItem.style.borderRadius = '6px';
            bgItem.style.cursor = 'pointer';
            bgItem.style.position = 'relative';
            bgItem.style.border = '2px solid transparent';
            bgItem.style.transition = 'all 0.3s';
            
            if (bg.is_active) {
                bgItem.style.borderColor = '#2ecc71';
            }
            
            bgItem.onclick = function() {
                document.getElementById('backgroundPreview').style.backgroundImage = `url('${bg.url}')`;
                
                // Set as active background
                fetch('/api/set_active_background', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: bg.filename
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadBackgrounds(); // Refresh list
                    }
                });
            };
            
            // Delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
            deleteBtn.style.position = 'absolute';
            deleteBtn.style.top = '5px';
            deleteBtn.style.right = '5px';
            deleteBtn.style.border = 'none';
            deleteBtn.style.background = 'rgba(231, 76, 60, 0.8)';
            deleteBtn.style.color = 'white';
            deleteBtn.style.borderRadius = '50%';
            deleteBtn.style.width = '25px';
            deleteBtn.style.height = '25px';
            deleteBtn.style.cursor = 'pointer';
            
            deleteBtn.onclick = function(e) {
                e.stopPropagation();
                
                Swal.fire({
                    title: 'Xác nhận xóa',
                    text: 'Bạn có chắc muốn xóa background này?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e74c3c',
                    cancelButtonColor: '#95a5a6',
                    confirmButtonText: 'Xóa',
                    cancelButtonText: 'Hủy'
                }).then((result) => {
                    if (result.isConfirmed) {
                        fetch('/api/delete_background', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                filename: bg.filename
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                loadBackgrounds(); // Refresh list
                            }
                        });
                    }
                });
            };
            
            bgItem.appendChild(deleteBtn);
            container.appendChild(bgItem);
        });
    });
}

// Load backgrounds khi tab được mở
document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('a[data-tab="background-management"]').addEventListener('click', loadBackgrounds);
});
</script>

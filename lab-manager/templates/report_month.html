<!-- Báo cáo tháng -->
<div id="report-month" class="tab-content">
    <h2 class="section-title">
        <i class="fas fa-chart-bar"></i> Báo cáo lượt truy cập theo khoa/viện
    </h2>
    <div class="form-container">
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <div class="form-group" style="flex: 1;">
                <label>Từ ngày</label>
                <input type="date" id="report-from-date" class="form-control">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Đến ngày</label>
                <input type="date" id="report-to-date" class="form-control">
            </div>
            <div class="form-group" style="align-self: flex-end;">
                <button onclick="loadKhoaVienReportRange()" class="btn btn-primary">
                    <i class="fas fa-search"></i> Xem báo cáo
                </button>
                <button class="btn btn-success" onclick="exportKhoaVienExcel()">
                    <i class="fas fa-file-excel"></i> Xuất Excel
                </button>
            </div>
        </div>
        <div class="table-container mt-3">
            <table id="khoa-vien-report-month-table" class="user-table">
                <thead>
                    <tr>
                        <th>Khoa/Viện</th>
                        <th>Lượt truy cập</th>
                        <th>Trung bình/ngày</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
